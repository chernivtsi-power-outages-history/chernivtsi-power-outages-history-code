name: Fetch Timetables (Kyiv Time)

on:
  schedule:
    - cron: '31 1,5,9,13,17,20,23 * * *'
  workflow_dispatch:

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout code repository
        uses: actions/checkout@v4
        with:
          repository: chernivtsi-power-outages-history/chernivtsi-power-outages-history-code
          path: chernivtsi-power-outages-history-code
      

      - name: Checkout timetables repository
        uses: actions/checkout@v4
        with:
          repository: chernivtsi-power-outages-history/chernivtsi-power-outages-history-timetables
          token: ${{ secrets.PAT_TOKEN }}
          path: chernivtsi-power-outages-history-timetables
      

      - name: Run fetch and commit script
        env:
          USE_KYIV_TIME: "true"
          GIT_USER_NAME: "github-actions[bot]"
          GIT_USER_EMAIL: "github-actions[bot]@users.noreply.github.com"
        run: |
          chmod +x chernivtsi-power-outages-history-code/script.sh
          bash chernivtsi-power-outages-history-code/script.sh